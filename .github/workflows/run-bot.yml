name: run-monitor

on:
  schedule:
    # Runs every hour from 6:00 AM to 6:00 PM NZST (UTC+12), Monday to Friday
    - cron: '0 18,19,20,21,22,23,0,1,2,3,4,5,6 * * 1-5'
  workflow_dispatch:   # Allows manual trigger from GitHub

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas feedparser requests openai

      - name: Run Grok Stock Monitor
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python stock_monitor.py
