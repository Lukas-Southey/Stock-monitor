name: Stock Monitor - Hourly (Mon-Fri 6am-6pm NZST)

on:
  schedule:
    - cron: '0 18-6 * * 1-5'     # Runs hourly from 6am to 6pm NZST (Mon-Fri)
  workflow_dispatch:             # Allows manual run anytime

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas feedparser openai requests

      - name: Run Stock Bot
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python stock_monitor.py
