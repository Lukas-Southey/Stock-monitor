name: Stock Monitor - Hourly (Mon-Fri)

on:
  schedule:
    - cron: '0 6 * * 1-5'
    - cron: '0 7 * * 1-5'
    - cron: '0 8 * * 1-5'
    - cron: '0 9 * * 1-5'
    - cron: '0 10 * * 1-5'
    - cron: '0 11 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '0 13 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '0 18 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas feedparser openai requests beautifulsoup4

      - name: Run Stock Bot
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python stock_monitor.py
