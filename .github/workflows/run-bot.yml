name: Stock Monitor - Hourly (Mon-Fri 6am-6pm NZST)

on:
  schedule:
    - cron: '0 6 * * 1-5'    # 6:00 AM
    - cron: '0 7 * * 1-5'    # 7:00 AM
    - cron: '0 8 * * 1-5'    # 8:00 AM
    - cron: '0 9 * * 1-5'    # 9:00 AM
    - cron: '0 10 * * 1-5'   # 10:00 AM
    - cron: '0 11 * * 1-5'   # 11:00 AM
    - cron: '0 12 * * 1-5'   # 12:00 PM
    - cron: '0 13 * * 1-5'   # 1:00 PM
    - cron: '0 14 * * 1-5'   # 2:00 PM
    - cron: '0 15 * * 1-5'   # 3:00 PM
    - cron: '0 16 * * 1-5'   # 4:00 PM
    - cron: '0 17 * * 1-5'   # 5:00 PM
    - cron: '0 18 * * 1-5'   # 6:00 PM
  workflow_dispatch:         # Allows manual run

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas feedparser openai requests

      - name: Run Stock Bot
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python stock_monitor.py
