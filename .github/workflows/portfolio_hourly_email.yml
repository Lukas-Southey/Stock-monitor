name: NZX-ASX Portfolio Hourly Report (Trading Hours)

on:
  schedule:
    - cron: '0 * * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-portfolio-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance pandas pytz

      - name: Run Portfolio Monitor (email + Telegram + optional Grok)
        env:
          SEND_EMAIL: "true"
          SEND_TELEGRAM: "true"
          USE_GROK_ANALYSIS: "true"           # Grok AI analysis enabled by default
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          python nzx_asx_portfolio_monitor.py

      - name: Upload report artifacts (only if files exist)
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('artifacts/portfolio_report.md') != ''
        with:
          name: portfolio-report
          path: |
            artifacts/portfolio_report.md
            artifacts/portfolio_valuation.csv
          retention-days: 7
